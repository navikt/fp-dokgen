tittel = Nav has denied your application for parental benefit
detteHarViAvslått = We have denied the following
lovhjemmel = The decision has been made in accordance with the National Insurance Act Section {lovhjemmelForAvslag}.
engangsstønadMulighet = Even if you are not entitled to parental benefits, you may still be eligible for a lump-sum grant. You can read more at [nav.no/engangsstonad](https://www.nav.no/engangsstonad)<br/><br/>
klage.tittel = You have the right to appeal
klage.tekst = You may appeal within {klagefristUker} weeks from the date you received the decision. You will find the relevant form and information at [nav.no/klage](https://nav.no/klage).

engangsstønad.du = You have already received a lump-sum grant. Your application has therefore been denied.
engangsstønad.annenForelder = The other parent has already received a lump-sum grant. Your application has therefore been denied.
foreldrepenger.fårUtbetalt.du = You have already received parental benefit. Your application has therefore been denied.
foreldrepenger.fårUtbetalt.annenForelder = The other parent has already received parental benefit. Your application has therefore been denied.

medlemskap.barnIkkeFødt = You are not entitled to parental benefit, because you are not a member of the Norwegian National Insurance Scheme.
medlemskap.fødsel = You are not entitled to parental benefit, because you were not a member of the Norwegian National Insurance Scheme at the time your {antallBarn|child was|children were} born.
medlemskap.omsorg = You are not entitled to parental benefit, because you were not a member of the Norwegian National Insurance Scheme at the time you assumed care of your {antallBarn|child|children}.

avslag.1035 = You are not entitled to parental benefit, because you have not had earned income or income equivalent to earned income in six of the past ten months before the start of the parental benefit period.
avslag.1041 = You are not entitled to parental benefit, because your income is lower than {halvG} kroner per year before taxes.
avslag.1001 = You are not entitled to parental benefit, because you have applied too early. You can apply when you are in your 22nd week of pregnancy.
avslag.1004_1013 = You are not entitled to parental benefit, because your {antallBarn|child was|children were} aged 15 years or older when you assumed care.
avslag.1026 = You are not entitled to parental benefit, because we do not have proof that the {antallBarn|child or the children have|child has|children have} been born.
avslag.1051 = You are not entitled to parental benefit, because you adopted your spouse’s or cohabitant’s {antallBarn|child|children} after the end of the parental benefit period.
avslag.4002 = You are not entitled to parental benefit from {periodeFom} up to and including {periodeTom}, because there are no more days left of the parental benefit period.
