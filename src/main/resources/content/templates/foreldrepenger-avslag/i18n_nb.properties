tittel = Nav har avslått søknaden din om foreldrepenger
detteHarViAvslått = Dette har vi avslått
lovhjemmel = Vedtaket er gjort etter folketrygdloven {lovhjemmelForAvslag}.
engangsstønadMulighet = Selv om du ikke har rett til foreldrepenger, kan det være at du har rett til engangsstønad. Les mer på [nav.no/engangsstonad](https://www.nav.no/engangsstonad)<br/><br/>
klage.tittel = Du har rett til å klage
klage.tekst = Du kan klage innen {klagefristUker} uker fra den datoen du mottok vedtaket. Du finner skjema og informasjon på [nav.no/klage](https://nav.no/klage).

engangsstønad.du = Du har allerede fått utbetalt engangsstønad. Derfor er søknaden din avslått.
engangsstønad.annenForelder = Den andre forelderen har allerede fått utbetalt engangsstønad. Derfor er søknaden din avslått.
foreldrepenger.fårUtbetalt.du = Du har allerede fått utbetalt foreldrepenger. Derfor er søknaden din avslått.
foreldrepenger.fårUtbetalt.annenForelder = Den andre forelderen har allerede fått utbetalt foreldrepenger. Derfor er søknaden din avslått.

medlemskap.barnIkkeFødt = Du har ikke rett til foreldrepenger fordi du ikke er medlem i folketrygden.
medlemskap.fødsel = Du har ikke rett til foreldrepenger fordi du ikke var medlem i folketrygden på det tidspunktet {antallBarn|barnet ditt ble født|barna dine ble født}.
medlemskap.omsorg = Du har ikke rett til foreldrepenger fordi du ikke var medlem i folketrygden på det tidspunktet du overtok omsorgen for {antallBarn|barnet ditt|barna dine}.

avslag.1035 = Du har ikke rett til foreldrepenger, fordi du ikke har hatt arbeidsinntekt eller inntekt som er likestilt med lønn i seks av de siste ti månedene før foreldrepengeperioden starter.
avslag.1041 = Du har ikke rett til foreldrepenger, fordi inntekten din er lavere enn {halvG} kroner i året før skatt.
avslag.1001 = Du har ikke rett til foreldrepenger fordi du har søkt for tidlig. Du kan søke når du er i svangerskapsuke 22.
avslag.1004_1013 = Du har ikke rett til foreldrepenger fordi {antallBarn|barnet ditt|barna dine} var fylt 15 år da du overtok omsorgen.
avslag.1026 = Du har ikke rett til foreldrepenger fordi vi ikke har opplysninger om at {antallBarn|barnet eller barna|barnet|barna} er født.
avslag.1051 = Du har ikke rett til foreldrepenger fordi du adopterte {antallBarn|barnet|barna} til ektefellen eller samboeren din etter at foreldrepengeperioden var avsluttet.
avslag.4002 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi det ikke er flere dager igjen av foreldrepengeperioden.
avslag.ikkeRegistrertSomForelder.far = Du har ikke rett til foreldrepenger fordi du ikke er registrert som far til {antallBarn|barnet eller barna|barnet|barna}.
avslag.ikkeRegistrertSomForelder.medmor = Du har ikke rett til foreldrepenger fordi du ikke er registrert som medmor til {antallBarn|barnet eller barna|barnet|barna}.
avslag.4012_4003 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi du ikke har omsorgen for {antallBarn|barnet|barna}.
avslag.1015 = Du har ikke rett til foreldrepenger fordi du har hatt samvær med {antallBarn|barnet|barna} minst en dag i uken og annenhver helg.
avslag.1014 = Du har ikke rett til foreldrepenger fordi du ikke har foreldreansvar for {antallBarn|barnet ditt|barna dine}.
avslag.1021 = Ifølge folkeregisteret har du flyttet fra Norge.
avslag.1020 = Du er omfattet av trygdeordningen i et annet land.
avslag.1023 = Du har ikke oppholdstillatelse i Norge.
avslag.1024 = Vi har ikke opplysninger om at du jobber eller har familie som forsørger deg i Norge. Det er derfor ikke dokumentert at du har rett til opphold etter EØS-avtalen.
avslag.1025 = Du regnes ikke som medlem fordi du oppholder deg mer i utlandet enn i Norge.
avslag.4020 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom}. Du må søke senest tre måneder etter at perioden med foreldrepenger har startet. Du søkte {mottattDato}.
avslag.4008 = Du kan ikke overta kvoten fra og med {periodeFom} til og med {periodeTom} fordi den andre forelderen ikke er innlagt i helseinstitusjon.
avslag.4076 = Du kan ikke overta kvoten fra og med {periodeFom} til og med {periodeTom} fordi den andre forelderen har rett til foreldrepenger. Hvis dette endrer seg kan du søke på nytt.
avslag.1028_4007 = Du kan ikke overta kvoten til den andre forelderen fra og med {periodeFom} til og med {periodeTom}.\n\n  For at du skal kunne overta kvoten, må den andre forelderen være helt avhengig av hjelp til å ta seg av {antallBarn|barnet|barna} på grunn av egen sykdom. Legeerklæringen viser ikke dette.
avslag.4050 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke er i jobb.
avslag.4051 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke tar godkjent utdanning på heltid.
avslag.4052 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke tar godkjent utdanning i kombinasjon med arbeid som til sammen blir heltid.
avslag.4053 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom}.\n\n  For at du skal kunne overta foreldrepengene, må mor være helt avhengig av hjelp til å ta seg av {antallBarn|barnet|barna} på grunn av egen sykdom. Legeerklæringen hennes viser ikke dette.
avslag.4054 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke er innlagt i helseinstitusjon.
avslag.4055 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke deltar på heltid i introduksjonsprogrammet for nyankomne innvandrere, ifølge integreringsloven kapittel 4.
avslag.4056 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke deltar på heltid i kvalifiseringsprogrammet.
avslag.4073 = Du kan ikke ta ut foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke har søkt om eller ikke har rett til foreldrepenger.
avslag.4075 = Hvis mor søker om foreldrepenger og i tillegg arbeider, studerer eller er i annen aktivitet, kan du ha rett til foreldrepenger. Dette kan du lese mer om på [nav.no/familie](https://nav.no/familie).
avslag.4057 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi mor ikke mottar uføretrygd. Hvis dette endrer seg senere, kan du søke på nytt.
avslag.1019 = Vi har avslått søknaden din fordi vi ikke har mottatt dokumentasjonen vi har bedt om.\n\n  Hvis du sender oss dokumentasjonen innen seks uker, behandler vi saken din på nytt. Du trenger ikke sende ny søknad.
avslag.4005 = Det er ikke søkt om foreldrepenger eller utsettelse fra og med {periodeFom} til og med {periodeTom}. Derfor er {antallTapteDager} {antallTapteDager|dag|dager} tapt.
avslag.4102 = Du har ikke søkt om foreldrepenger fra og med {periodeFom} til og med {periodeTom}. Du har heller ikke oppgitt at mor jobber, studerer eller er i annen aktivitet i denne perioden. Derfor har du mistet {antallTapteDager} {antallTapteDager|dag|dager}.
avslag.4033 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi du ikke har avtalt ferien med arbeidsgiveren din.
avslag.4041 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi du ikke kan ta ut ferie på helligdager.
avslag.4032 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi det er kun arbeidstakere som har rett til ferie etter ferieloven.
avslag.4039_4111 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi du ikke er innlagt i helseinstitusjon.
avslag.4040_4112 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi {antallBarn|barnet ditt|barna dine} ikke er innlagt i helseinstitusjon.
avslag.4037 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi du ikke jobber heltid.
avslag.4030_4031 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi det ikke har gått seks uker siden {antallBarn|barnet ditt|barna dine} ble født. Du vil få utbetalt foreldrepenger i perioden.
avslag.4038_4110 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom}.\n\n  For å kunne utsette foreldrepengene på grunn av sykdom, må du være er helt avhengig av hjelp til å ta deg av {antallBarn|barnet|barna}. Legeerklæringen viser ikke dette.
avslag.4082 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi du har søkt for sent.\n\n  For å ha rett til å utsette foreldrepengene må du søke før du begynner å jobbe.
avslag.4504 = Du kan ikke kombinere foreldrepengene med arbeid fra og med {periodeFom} til og med {periodeTom}.\n\n  Foreldrepengene dine kan først kombineres med arbeid seks uker etter fødselen.
avslag.4025 = Du kan ikke kombinere foreldrepengene med arbeid fra og med {periodeFom} til og med {periodeTom}.\n\n  Fordi du jobber 100 prosent eller mer kan du ikke ta ut foreldrepenger ved siden av arbeidet.
avslag.4080_4501 = Du kan ikke kombinere foreldrepengene med arbeid fra og med {periodeFom} til og med {periodeTom} fordi du har søkt for sent.\n\n  For å ha rett til å kombinere foreldrepengene med arbeid må du søke før du begynner å jobbe. Vi har derfor redusert foreldrepengene dine fordi du jobber.
avslag.4093 = Du kan ikke kombinere foreldrepengene med arbeid fra og med {periodeFom} til og med {periodeTom} fordi du ikke er i jobb.
avslag.4084_4085 = Du kan ikke ta ut foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi den andre forelderen tar ut foreldrepenger i samme periode.
avslag.4086 = Du kan ikke ta ut foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi den andre forelderen utsetter foreldrepengene i samme periode.
avslag.4092 = Du kan ikke overta kvoten fra og med {periodeFom} til og med {periodeTom} fordi du ikke har aleneomsorgen for {antallBarn|barnet|barna}. Hvis dette endrer seg kan du søke på nytt.
avslag.4061_4115 = Du har søkt om å utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom}, men du har ikke sendt oss dokumentasjonen vi har bedt om. Derfor har vi ikke nok opplysninger til å vurdere om du har rett til å utsette.
avslag.4094_4502 = Du har søkt om å kombinere foreldrepengene med arbeid fra og med {periodeFom} til og med {periodeTom}, men du har ikke sendt inn dokumentasjonen vi har bedt om. Derfor har vi ikke nok opplysninger til å vurdere om du har rett til å kombinere foreldrepengene med arbeid.
avslag.4074 = Du har søkt om å overta kvoten til den andre forelderen fra og med {periodeFom} til og med {periodeTom}, men du har ikke sendt inn dokumentasjonen vi har bedt om. Derfor har vi ikke nok opplysninger til å vurdere om du har rett til å overta kvoten.
avslag.4066_4089 = Du har søkt om foreldrepenger fra og med {periodeFom} til og med {periodeTom}, men du har ikke sendt inn dokumentasjonen vi har bedt om. Derfor har vi ikke nok opplysninger til å vurdere om du har rett til foreldrepenger i denne perioden.
avslag.4013 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi du tidligst kan starte foreldrepengeperioden 12 uker før termin.
avslag.4022 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi {antallBarn|barnet ditt|barna dine} er fylt tre år.
avslag.4034 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi det ikke er flere dager igjen av foreldrepengeperioden.
avslag.4035 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom}.\n\n  Du kan bare utsette når mor jobber, studerer eller er i en annen aktivitet. Du kan lese mer om dette på [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
avslag.4058_4059 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom}.\n\n  For at du skal få flere dager med foreldrepenger, må den andre forelderen jobbe, studere eller være i en annen aktivitet. Du kan lese mer om dette på [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
avslag.4060 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom}.\n\n  Foreldrepengene du har søkt om kan ikke kombineres med det den andre forelderen har søkt om for samme periode. Dere kan bare ta ut foreldrepenger samtidig når den ene av dere tar ut 100 prosent kvote og den andre tar ut opptil 50 prosent fellesperiode.
avslag.4081 = Du kan ikke utsette foreldrepengene fra og med {periodeFom} til og med {periodeTom} fordi du har søkt for sent.\n\n  For å ha rett til å utsette foreldrepengene må du søke før ferien starter.
avslag.4100 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi du tidligst kan få foreldrepenger fra den dagen du overtar omsorgen for {antallBarn|barnet|barna}.
avslag.4087 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi du ikke er medlem i folketrygden.\n\n  Du har ikke oppholdstillatelse i Norge i denne perioden.
avslag.4104 = Du har ikke rett til foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi foreldrepenger for nytt barn har startet.
avslag.4108 = Du kan ikke ta ut foreldrepenger fra og med {periodeFom} til og med {periodeTom} fordi den andre forelderen tar ut en pengestøtte tilsvarende foreldrepenger i et annet EU/EØS-land i samme periode.