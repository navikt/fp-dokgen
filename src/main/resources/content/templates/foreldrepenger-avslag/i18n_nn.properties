tittel = Nav har avslått søknaden din om foreldrepengar
detteHarViAvslått = Dette har vi avslått
lovhjemmel = Vedtaket er gjort etter folketrygdlova {lovhjemmelForAvslag}.
engangsstønadMulighet = Sjølv om du ikkje har rett til foreldrepengar, kan det vere at du har rett til engangsstønad. Les mer på [nav.no/engangsstonad](https://www.nav.no/engangsstonad)<br/><br/>
klage.tittel = Du har rett til å klage
klage.tekst = Du kan klage innan {klagefristUker} veker frå den datoen du fekk vedtaket. Du finn skjema og informasjon på [nav.no/klage](https://nav.no/klage).

engangsstønad.du = Du har allereie fått utbetalt eingongsstønad. Derfor er søknaden din avslått.
engangsstønad.annenForelder = Den andre forelderen har allereie fått utbetalt eingongsstønad. Derfor er søknaden din avslått.
foreldrepenger.fårUtbetalt.du = Du har allereie fått utbetalt foreldrepengar. Derfor er søknaden din avslått.
foreldrepenger.fårUtbetalt.annenForelder = Den andre forelderen har allereie fått utbetalt foreldrepengar. Derfor er søknaden din avslått.

medlemskap.barnIkkeFødt = Du har ikkje rett til foreldrepengar fordi du ikkje er medlem av folketrygda.
medlemskap.fødsel = Du har ikkje rett til foreldrepengar fordi du ikkje var medlem av folketrygda på det tidspunktet då {antallBarn|barnet ditt blei fødd|barna dine blei fødde}.
medlemskap.omsorg = Du har ikkje rett til foreldrepengar fordi du ikkje var medlem av folketrygda på det tidspunktet då du tok over omsorga for {antallBarn|barnet ditt|barna dine}.

avslag.1035 = Du har ikkje rett til foreldrepengar fordi du ikkje har hatt arbeidsinntekt eller inntekt som er likestilt med lønn i seks av dei siste ti månadene før foreldrepengeperioden startar.
avslag.1041 = Du har ikkje rett til foreldrepengar fordi inntekta di er lågare enn {halvG} kroner i året før skatt.
avslag.1001 = Du har ikkje rett til foreldrepengar fordi du har søkt for tidleg. Du kan tidlegast søkje når du er i svangerskapsveke 22.
avslag.1004_1013 = Du har ikkje rett til foreldrepengar fordi {antallBarn|barnet ditt|barna dine} hadde fylt 15 år då du tok over omsorga.
avslag.1026 = Du har ikkje rett til foreldrepengar fordi vi ikkje har opplysningar om at {antallBarn|barnet eller barna er fødde|barnet er fødd|barna er fødde}.
avslag.1051 = Du har ikkje rett til foreldrepengar fordi du adopterte {antallBarn|barnet|barna} til ektefellen eller sambuaren din etter at foreldrepengeperioden var avslutta.
avslag.4002 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi det ikkje er fleire dagar igjen av foreldrepengeperioden.
avslag.ikkeRegistrertSomForelder.far = Du har ikkje rett til foreldrepengar fordi du ikkje er registrert som far til {antallBarn|barnet eller barna|barnet|barna}.
avslag.ikkeRegistrertSomForelder.medmor = Du har ikkje rett til foreldrepengar fordi du ikkje er registrert som medmor til {antallBarn|barnet eller barna|barnet|barna}.
avslag.4012_4003 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi du ikkje har omsorga for {antallBarn|barnet ditt|barna dine}.
avslag.1015 = Du har ikkje rett til foreldrepengar fordi du har hatt samvær med {antallBarn|barnet|barna} minst éin dag i veka og annankvar helg.
avslag.1014 = Du har ikkje rett til foreldrepengar fordi du ikkje har foreldreansvar for {antallBarn|barnet ditt|barna dine}.
avslag.1021 = Ifølgje folkeregisteret har du flytta frå Noreg.
avslag.1020 = Du er omfatta av trygdeordninga i eit anna land.
avslag.1023 = Du har ikkje opphaldsløyve i Noreg.
avslag.1024 = Vi har ikkje opplysningar om at du arbeider eller har familie som forsørgjer deg i Noreg. Det var derfor ikkje dokumentert at du har rett til opphald etter EØS-avtalen.
avslag.1025 = Du blir ikkje rekna som medlem fordi du oppheld deg meir i utlandet enn i Noreg.
avslag.4020 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom}. Du må søkje seinast tre månader etter at perioden med foreldrepengar starta. Du søkte {mottattDato}.
avslag.4008 = Du kan ikkje ta over kvoten frå og med {periodeFom} til og med {periodeTom} fordi den andre forelderen ikkje er lagd inn i helseinstitusjon.
avslag.4076 = Du kan ikkje ta over kvoten frå og med {periodeFom} til og med {periodeTom} fordi den andre forelderen har rett til foreldrepengar. Dersom dette endrar seg kan du søkje på nytt.
avslag.1028_4007 = Du kan ikkje ta over kvoten frå og med {periodeFom} til og med {periodeTom}.\n\n  For at du skal kunne overta kvoten må den andre forelderen vere heilt avhengig av hjelp til å ta vare på {antallBarn|barnet|barna} på grunn av eigen sjukdom. Legeerklæringa viser ikkje dette.
avslag.4050 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje er i arbeid.
avslag.4051 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje tek godkjend utdanning på heiltid.
avslag.4052 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje tek godkjend utdanning i kombinasjon med arbeid som til saman blir heiltid.
avslag.4053 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom}.\n\n  For at du skal kunne overta foreldrepengane, må mor vere heilt avhengig av hjelp til å ta vare på {antallBarn|barnet|barna} på grunn av eigen sjukdom. Legeerklæringa hennar viser ikkje dette.
avslag.4054 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje er innlagd i helseinstitusjon.
avslag.4055 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje deltek på heiltid i introduksjonsprogrammet for nyinnkomne innvandrarar, ifølgje kapittel 4 i integreringslova.
avslag.4056 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje deltek på heiltid i kvalifiseringsprogrammet.
avslag.4073 = Du kan ikkje ta ut foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje har søkt om eller ikkje har rett til foreldrepengar.
avslag.4075 = Dersom mor søkjer om foreldrepengar og i tillegg arbeider, studerer eller er i ein annan aktivitet, kan du ha rett til foreldrepengar. Dette kan du lese meir om på [nav.no/familie](https://nav.no/familie).
avslag.4057 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi mor ikkje får uføretrygd. Dersom dette endrar seg seinare, kan du søkje på nytt.
avslag.1019 = Vi har avslått søknaden din fordi vi ikkje har fått dokumentasjonen vi har bede om.\n\n  Dersom du sender oss dokumentasjonen innan seks veker, behandlar vi saka di på nytt. Du treng ikkje sende ny søknad.
avslag.4005 = Det er ikkje søkt om foreldrepengar eller utsetjing frå og med {periodeFom} til og med {periodeTom}. Derfor er {antallTapteDager} {antallTapteDager|dag tapt|dagar tapte}.
avslag.4102 = Du har ikkje søkt om foreldrepengar frå og med {periodeFom} til og med {periodeTom}. Du har heller ikkje oppgitt at mor jobbar, studerer eller er i annan aktivitet i denne perioden. Derfor har du mista {antallTapteDager} {antallTapteDager|dag|dagar}.
avslag.4033 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi du ikkje har avtalt ferien med arbeidsgivaren din.
avslag.4041 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi du ikkje kan ta ut ferie på heilagdagar.
avslag.4032 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi det berre er arbeidstakarar som har rett til ferie etter ferielova.
avslag.4039_4111 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi du ikkje er innlagd i helseinstitusjon.
avslag.4040_4112 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi {antallBarn|barnet ditt|barna dine} ikkje er {antallBarn|innlagd|innlagde} i helseinstitusjon.
avslag.4037 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi du ikkje jobbar heiltid.
avslag.4030_4031 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi det ikkje har gått seks veker sidan {antallBarn|barnet ditt blei fødd|barna dine blei fødde}. Du vil få utbetalt foreldrepengar i perioden.
avslag.4038_4110 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom}.\n\n  For å utsetje foreldrepengane på grunn av sjukdom må du vere heilt avhengig av hjelp til å ta deg av {antallBarn|barnet|barna}. Legeerklæringa di viser ikkje dette.
avslag.4082 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi du har søkt for seint.\n\n  For å ha rett til å utsetje foreldrepengane må du søkje før du begynner å jobbe.
avslag.4504 = Du kan ikkje kombinere foreldrepengane med arbeid frå og med {periodeFom} til og med {periodeTom}.\n\n  Foreldrepengane dine kan først kombinerast med arbeid seks veker etter fødselen.
avslag.4025 = Du kan ikkje kombinere foreldrepengane med arbeid frå og med {periodeFom} til og med {periodeTom}.\n\n  Fordi du jobbar 100 prosent eller meir, kan du ikkje ta ut foreldrepengar ved sida av arbeidet.
avslag.4080_4501 = Du kan ikkje kombinere foreldrepengane med arbeid frå og med {periodeFom} til og med {periodeTom} fordi du har søkt for seint.\n\n  For å ha rett til å kombinere foreldrepengane med arbeid må du søkje før du begynner å jobbe. Vi har derfor redusert foreldrepengane dine fordi du jobbar.
avslag.4093 = Du kan ikkje kombinere foreldrepengane med arbeid frå og med {periodeFom} til og med {periodeTom} fordi du ikkje er i jobb.
avslag.4084_4085 = Du kan ikkje ta ut foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi den andre forelderen tek ut foreldrepengar i same periode.
avslag.4086 = Du kan ikkje ta ut foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi den andre forelderen utsett foreldrepengane i same periode.
avslag.4092 = Du kan ikkje overta kvoten frå og med {periodeFom} til og med {periodeTom} fordi du ikkje har åleineomsorga for {antallBarn|barnet|barna}. Dersom dette endrar seg, kan du søkje på nytt.
avslag.4061_4115 = Du har søkt om å utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom}, men du har ikkje sendt oss dokumentasjonen vi har bede om. Derfor har vi ikkje nok opplysningar til å vurdere om du har rett til å utsetje.
avslag.4094_4502 = Du har søkt om å kombinere foreldrepengane med arbeid frå og med {periodeFom} til og med {periodeTom}, men du har ikkje sendt oss dokumentasjonen vi har bede om. Derfor har vi ikkje nok opplysningar til å vurdere om du har rett til å kombinere foreldrepengane med arbeid.
avslag.4074 = Du har søkt om å ta over kvoten til den andre forelderen frå og med {periodeFom} til og med {periodeTom}, men du har ikkje sendt oss dokumentasjonen vi har bede om. Derfor har vi ikkje nok opplysningar til å vurdere om du har rett til å overta kvoten.
avslag.4066_4089 = Du har søkt om foreldrepengar frå og med {periodeFom} til og med {periodeTom}, men du har ikkje sendt oss dokumentasjonen vi har bede om. Derfor har vi ikkje nok opplysningar til å vurdere om du har rett til foreldrepengar i denne perioden.
avslag.4013 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi du tidlegast kan starte foreldrepengeperioden 12 veker før termin.
avslag.4022 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi {antallBarn|barnet ditt|barna dine} er fylt tre år.
avslag.4034 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi det ikkje er fleire dagar igjen av foreldrepengeperioden.
avslag.4035 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom}.\n\n  Du kan berre utsetje når mor jobbar, studerer eller er i ein annan aktivitet. Du kan lese meir om dette på [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
avslag.4058_4059 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom}.\n\n  For at du skal kunne få fleire dagar med foreldrepengar, må den andre forelderen vere i jobb, studere eller vere i ein annan aktivitet. Du kan lese meir om dette på [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
avslag.4060 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom}.\n\n  Du kan ikkje kombinere foreldrepengane du har søkt om, med det den andre forelderen har søkt om i same perioden. De kan berre ta ut foreldrepengar samtidig når den eine av dykk tek ut 100 prosent kvote, og den andre tek ut opptil 50 prosent fellesperiode.
avslag.4081 = Du kan ikkje utsetje foreldrepengane frå og med {periodeFom} til og med {periodeTom} fordi du har søkt for seint.\n\n  For å ha rett til å utsetje foreldrepengane må du søkje før ferien startar.
avslag.4100 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi du tidlegast kan få foreldrepengar frå den dagen du overtek omsorga for {antallBarn|barnet|barna}.
avslag.4087 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi du ikkje er medlem i folketrygda.\n\n  Du har ikkje opphaldsløyve i Noreg i denne perioden.
avslag.4104 = Du har ikkje rett til foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi foreldrepengar for nytt barn har startet.
avslag.4108 = Du kan ikkje ta ut foreldrepengar frå og med {periodeFom} til og med {periodeTom} fordi den andre forelderen tek ut ei pengestøtte tilsvarande foreldrepengar i eit anna EU/EØS-land i same periode.