tittel = Nav har endra foreldrepengane dine
intro.brukerValgte = Du har valt å ikkje ta ut din tidlegare innvilga periode med foreldrepengar.
intro.annullert = Den tidlegare innvilga perioden din med foreldrepengar vart annullert.
nyPeriode = Du tek ut foreldrepengar frå {planlagtOppstartDato}.\n\nNår den nye søknaden din blir behandla, blir foreldrepengane dine berekna ut frå den inntekta du har når du startar uttaket ditt. Det må også vurderast om du har tent opp rett til foreldrepengar når perioden din startar. Les meir om dette på [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
pleiepenger = Du får pleiepengar i staden for foreldrepengar i perioden du hadde fått innvilga foreldrepengar. Difor er foreldrepengane dine avslutta, men du mistar ikkje dagar.
annenPartOvertar = Mor har søkt om overtaking av din tidlegare innvilga perioden med foreldrapengar. Difor er foreldrepengane dine avslutta, men du mistar ikkje dagar.
måSøkePåNytt = Du må søkje om ny foreldrepengeperiode på [nav.no/foreldrepenger](https://nav.no/foreldrepenger). Foreldrepengane må vere tatt ut seinast dagen før ny foreldrepengeperiode for nytt barn startar, eller seinast dagen før barnet fyller tre år.
inntektsmelding = Når det er 4 veker eller mindre igjen til du skal ta ut foreldrepengar, må arbeidsgivaren din sende inn ny inntektsmelding.
lovhjemmel = Vedtaket er gjort etter folketrygdlova §§ 14-6, 14-7, 14-9, 14-10, 14-11 og 14-12.
klage.tittel = Du har rett til å klage
klage.tekst = Du kan klage innan {klagefristUker} veker frå den datoen du fekk vedtaket. Du finn skjema og informasjon på [nav.no/klage](https://nav.no/klage).
