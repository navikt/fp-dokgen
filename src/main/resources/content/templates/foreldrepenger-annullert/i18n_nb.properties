tittel = Nav har endret foreldrepengene dine
intro.brukerValgte = Du har valgt å ikke ta ut din tidligere innvilgede periode med foreldrepenger.
intro.annullert = Din tidligere innvilgede periode med foreldrepenger ble annullert.
nyPeriode = Du tar ut foreldrepenger fra {planlagtOppstartDato}.\n\nNår den nye søknaden din behandles, blir foreldrepengene dine beregnet ut fra den inntekten du har når du starter uttaket ditt. Det må også vurderes om du har tjent opp rett til foreldrepenger når perioden din starter. Les mer om dette på [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
pleiepenger = Du mottar pleiepenger istedenfor foreldrepenger i perioden du hadde fått innvilget foreldrepenger. Derfor er foreldrepengene dine opphørt, men du mister ikke dager.
annenPartOvertar = Mor har søkt om overtakelse av din tidligere innvilgede periode med foreldrepenger. Derfor er foreldrepengene dine opphørt, men du mister ikke dager.
måSøkePåNytt = Du må søke om ny foreldrepengeperiode på [nav.no/foreldrepenger](https://nav.no/foreldrepenger). Foreldrepengene må være tatt ut senest dagen før ny foreldrepengeperiode for nytt barn starter, eller senest dagen før barnet fyller tre år.
inntektsmelding = Når det er 4 uker eller mindre igjen til du skal ta ut foreldrepenger, må arbeidsgiveren din sende inn ny inntektsmelding.
lovhjemmel = Vedtaket er gjort etter folketrygdloven §§ 14-6, 14-7, 14-9, 14-10, 14-11 og 14-12.
klage.tittel = Du har rett til å klage
klage.tekst = Du kan klage innen {klagefristUker} uker fra den datoen du mottok vedtaket. Du finner skjema og informasjon på [nav.no/klage](https://nav.no/klage).
