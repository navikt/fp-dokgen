tittel = Nav has changed your parental benefit
intro.brukerValgte = You have chosen not to withdraw your previously granted period of parental benefit.
intro.annullert = The previously granted period of parental benefit has been annulled.
nyPeriode = You are withdrawing your parental benefit from {planlagtOppstartDato}.\n\nWhen your new application is processed, your parental benefit will be calculated based on the income you have when you start your withdrawal. It must also be considered whether you have earned the right to parental benefit when your period starts. You can read more about this at [nav.no/foreldrepenger](https://nav.no/foreldrepenger).
pleiepenger = You receive care benefit instead of parental benefit during the period you had been granted parental benefit. Therefore, your parental benefit has ended, but you do not lose any days.
annenPartOvertar = The mother has applied to take over your previously granted parental benefit period. Therefore, your parental benefit has ended, but you do not lose any days.
måSøkePåNytt = You must apply for a new parental benefit period at [nav.no/foreldrepenger](https://nav.no/foreldrepenger). The parental benefit must be withdrawn no later than the day before the new parental benefit period for a new child begins, or no later than the day before the child reaches the age of three.
inntektsmelding = When there are 4 weeks or less left until you are to withdraw your parental benefit, your employer must submit a new income report.
lovhjemmel = The decision has been made pursuant to section 14-6, 14-7, 14-9, 14-10, 14-11 and 14-12 of the National Insurance Act.
klage.tittel = You have the right to appeal
klage.tekst = You may appeal within {klagefristUker} weeks from the date you received the decision. You will find the relevant form and information at [nav.no/klage](https://nav.no/klage).
